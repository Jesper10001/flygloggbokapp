name = "blades-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# API-nyckeln lagras som secret — aldrig i kod eller git.
# Sätt den med: wrangler secret put ANTHROPIC_API_KEY

# Telemetri — Cloudflare Analytics Engine (gratis)
[[analytics_engine_datasets]]
binding = "TELEMETRY"

# Quota tracking — KV namespace for per-device monthly limits
# Create with: wrangler kv:namespace create QUOTA_KV
# Then add the id below:
[[kv_namespaces]]
binding = "QUOTA_KV"
id = "784887bfd7f24f4a81f846f42409c8fb"
